<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito Pro</title>

<style>
    /* Estilos base mejorados */
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        margin: 0;
        padding: 40px 20px;
        color: #333;
        min-height: 100vh;
    }

    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
        text-align: center;
        color: #2d3436;
        font-size: 1.8rem;
        margin-bottom: 25px;
    }

    h3 {
        font-size: 1.1rem;
        color: #636e72;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
        margin-top: 30px;
    }

    /* Inputs estilizados */
    input {
        padding: 12px;
        margin: 8px 0;
        border-radius: 10px;
        border: 2px solid #edf2f7;
        width: calc(100% - 28px);
        transition: all 0.3s ease;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    /* Botones con jerarquía visual */
    button {
        padding: 10px 18px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.1s, background 0.2s;
    }

    button:active {
        transform: scale(0.96);
    }

    /* Colores por acción */
    button[onclick="add()"] { background: #2ecc71; color: white; width: 100%; margin-top: 10px; }
    button[onclick="getTotal()"] { background: #3498db; color: white; }
    button[onclick="checkout()"] { background: #6c5ce7; color: white; padding: 12px 25px; }
    button[onclick="clearCart()"] { background: #ff7675; color: white; }
    
    /* Botones de la lista */
    li button { padding: 5px 10px; background: #fff; border: 1px solid #ddd; }
    li button:hover { background: #f8f9fa; }

    .section { margin-top: 25px; }

    /* Lista de productos */
    ul { padding: 0; }
    li {
        background: #ffffff;
        margin: 10px 0;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #f0f0f0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .total {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 15px;
        margin-top: 30px;
        border: 2px dashed #d1d8e0;
    }

    .total span { color: #2ecc71; font-size: 24px; }

    .search {
        background: #f1f3f5 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 12px center;
        padding-left: 40px !important;
        width: calc(100% - 56px) !important;
    }
</style>

</head>

<body>

<div class="container">

<h2>🛒 Carrito</h2>

<div class="section">
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input id="name" placeholder="Nombre" style="flex: 2;">
        <input id="price" type="number" placeholder="Precio" style="flex: 1;">
    </div>
    <button onclick="add()">+ Agregar Producto</button>
</div>

<div class="section">
    <input id="search" class="search" placeholder="Buscar en el carrito..." oninput="load()">
</div>

<div class="section">
    <ul id="list"></ul>
</div>

<div class="section total">
    <div style="margin-bottom: 10px;">Total: $<span id="total">0</span></div>
    <button onclick="getTotal()">🔄 Actualizar Total</button>
</div>

<div class="section">
    <h3>Datos del Cliente</h3>
    <input id="clientName" placeholder="Nombre completo">
    <input id="clientEmail" placeholder="Correo electrónico">
</div>

<div class="section" style="text-align:center; padding-top: 10px;">
    <button onclick="checkout()">💳 Pagar Ahora</button>
    <button onclick="clearCart()">🗑 Vaciar</button>
</div>

</div>

<script>
    // Se mantiene EXACTAMENTE tu misma lógica de script
    const API = "http://localhost:8080/cart";

    function add() {
        const name = document.getElementById("name").value;
        const price = document.getElementById("price").value;
        if (!name || price <= 0) { alert("Datos inválidos"); return; }
        fetch(`${API}?name=${name}&price=${price}`, { method: "POST"})
        .then(() => {
            load();
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
        });
    }

    function load() {
        fetch(API)
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById("list");
            const search = document.getElementById("search").value.toLowerCase();
            list.innerHTML = "";
            data
            .filter(p => p.name.toLowerCase().includes(search))
            .forEach(p => {
                list.innerHTML += `
                <li>
                    <div><strong>${p.name}</strong> <br> <small style="color:#666">$${p.price}</small></div>
                    <div>
                        <button onclick="edit(${p.id})">✏️</button>
                        <button onclick="del(${p.id})" style="color:#e74c3c">❌</button>
                    </div>
                </li>`;
            });
        });
    }

    function del(id) {
        fetch(API + "/" + id, { method: "DELETE"}).then(() => load());
    }

    function edit(id) {
        const name = prompt("Nuevo nombre:");
        const price = prompt("Nuevo precio:");
        if (!name || price <= 0) return;
        fetch(`${API}/${id}?name=${name}&price=${price}`, { method: "PUT"}).then(() => load());
    }

    function getTotal() {
        fetch(API + "/total").then(r => r.text()).then(t => document.getElementById("total").innerText = t);
    }

    function clearCart() {
        fetch(API + "/clear", { method: "DELETE"}).then(() => {
            load();
            document.getElementById("total").innerText = "0";
        });
    }

    function checkout() {
        const name = document.getElementById("clientName").value;
        const email = document.getElementById("clientEmail").value;
        if (!name || !email) { alert("Ingrese datos del cliente"); return; }
        fetch(API + "/checkout", { method: "POST"})
        .then(r => r.text())
        .then(msg => {
            alert("Cliente: " + name + "\nCorreo: " + email + "\n" + msg);
            load();
            document.getElementById("total").innerText = "0";
            document.getElementById("clientName").value = "";
            document.getElementById("clientEmail").value = "";
        });
    }
    load();
</script>

</body>
</html>
